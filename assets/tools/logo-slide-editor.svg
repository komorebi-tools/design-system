<svg xmlns="http://www.w3.org/2000/svg" width="200" height="28" viewBox="0 0 200 28" fill="none">
  <!-- Icon: slide with edit pencil -->
  <g transform="translate(2, 1)">
    <!-- Slide frame -->
    <rect x="0" y="0" width="32" height="22" rx="2.5" fill="white" stroke="#6E87B6" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="32" height="5.5" rx="2.5" fill="#6E87B6" opacity="0.15"/>
    <!-- Content lines -->
    <rect x="4" y="8" width="14" height="2" rx="1" fill="#6E87B6" opacity="0.7"/>
    <rect x="4" y="12.5" width="20" height="1.5" rx="0.75" fill="#CCC"/>
    <rect x="4" y="16" width="16" height="1.5" rx="0.75" fill="#CCC"/>
    <!-- Pencil -->
    <g transform="translate(24, 12) rotate(-45)">
      <rect x="0" y="0" width="4" height="14" rx="1" fill="#6E87B6" opacity="0.8"/>
      <polygon points="0,14 2,17 4,14" fill="#6E87B6" opacity="0.8"/>
      <rect x="0" y="0" width="4" height="3" rx="1" fill="#5A74A3"/>
    </g>
  </g>
  <!-- Text -->
  <text x="48" y="19" font-family="'Inter', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="#333" letter-spacing="0.01em">Slide Editor</text>
</svg>
