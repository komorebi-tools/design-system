<svg xmlns="http://www.w3.org/2000/svg" width="210" height="40" viewBox="0 0 210 40" fill="none">
  <!-- Icon: scaled down 60% and vertically centered -->
  <g transform="translate(0, 2) scale(0.6)">
    <!-- Stacked slides -->
    <rect x="12" y="2" width="40" height="30" rx="3" fill="#9BB0D0" opacity="0.3"/>
    <rect x="6" y="8" width="40" height="30" rx="3" fill="#6E87B6" opacity="0.4"/>
    <rect x="0" y="14" width="40" height="30" rx="3" fill="white" stroke="#6E87B6" stroke-width="1.5"/>
    <!-- Content lines -->
    <rect x="6" y="20" width="18" height="3" rx="1.5" fill="#6E87B6" opacity="0.8"/>
    <rect x="6" y="26" width="28" height="2" rx="1" fill="#CCC"/>
    <rect x="6" y="31" width="24" height="2" rx="1" fill="#CCC"/>
    <rect x="6" y="36" width="20" height="2" rx="1" fill="#CCC"/>
    <!-- Arrow -->
    <path d="M48 28 L58 28" stroke="#6E87B6" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M55 24 L60 28 L55 32" stroke="#6E87B6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Output slides -->
    <rect x="64" y="6" width="28" height="21" rx="2.5" fill="white" stroke="#6E87B6" stroke-width="1.5" transform="rotate(-6 64 6)"/>
    <rect x="6" y="0" width="18" height="2.5" rx="1" fill="#6E87B6" opacity="0.6" transform="translate(62 12) rotate(-6)"/>
    <rect x="66" y="12" width="28" height="21" rx="2.5" fill="white" stroke="#6E87B6" stroke-width="1.5"/>
    <rect x="72" y="17" width="18" height="2.5" rx="1" fill="#6E87B6" opacity="0.6"/>
    <rect x="68" y="18" width="28" height="21" rx="2.5" fill="white" stroke="#6E87B6" stroke-width="1.5" transform="rotate(6 68 18)"/>
    <rect x="6" y="0" width="18" height="2.5" rx="1" fill="#6E87B6" opacity="0.6" transform="translate(66 24) rotate(6)"/>
    <!-- Sparkle -->
    <g transform="translate(56 10)" fill="#6E87B6" opacity="0.5">
      <path d="M4 0 L4.8 2.8 L8 4 L4.8 5.2 L4 8 L3.2 5.2 L0 4 L3.2 2.8 Z"/>
    </g>
  </g>

  <!-- Text -->
  <text x="66" y="24" font-family="'Inter', 'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#333" letter-spacing="0.01em">Slide Editor</text>
</svg>
