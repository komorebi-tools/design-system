<svg xmlns="http://www.w3.org/2000/svg" width="200" height="28" viewBox="0 0 200 28" fill="none">
  <!-- Icon: slide with edit pencil -->
  <g transform="translate(2, 2)">
    <!-- Slide frame -->
    <rect x="0" y="0" width="30" height="21" rx="2.5" fill="white" stroke="#6E87B6" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="30" height="5.5" rx="2.5" fill="#6E87B6" opacity="0.15"/>
    <!-- Content lines -->
    <rect x="4" y="8" width="13" height="2" rx="1" fill="#6E87B6" opacity="0.7"/>
    <rect x="4" y="12" width="18" height="1.5" rx="0.75" fill="#CCC"/>
    <rect x="4" y="15.5" width="14" height="1.5" rx="0.75" fill="#CCC"/>
    <!-- Pencil (small, bottom-right) -->
    <g transform="translate(22, 13) rotate(-45)">
      <rect x="0" y="0" width="3" height="10" rx="0.8" fill="#6E87B6" opacity="0.8"/>
      <polygon points="0,10 1.5,12.5 3,10" fill="#6E87B6" opacity="0.8"/>
      <rect x="0" y="0" width="3" height="2.5" rx="0.8" fill="#5A74A3"/>
    </g>
  </g>
  <!-- Text -->
  <text x="44" y="19" font-family="'Inter', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="#333" letter-spacing="0.01em">Slide Editor</text>
</svg>
