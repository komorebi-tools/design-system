<svg xmlns="http://www.w3.org/2000/svg" width="220" height="28" viewBox="0 0 220 28" fill="none">
  <!-- Icon: document with bar chart -->
  <g transform="translate(2, 0)">
    <!-- Document -->
    <rect x="0" y="0" width="24" height="28" rx="2.5" fill="white" stroke="#6E87B6" stroke-width="1.5"/>
    <!-- Folded corner -->
    <path d="M16 0 L24 0 L24 8" fill="#E8EDF5"/>
    <path d="M16 0 L24 8 L16 8 Z" fill="#E8EDF5" stroke="#6E87B6" stroke-width="1" stroke-linejoin="round"/>
    <!-- Title line -->
    <rect x="4" y="11" width="12" height="2" rx="1" fill="#6E87B6" opacity="0.7"/>
    <!-- Bar chart -->
    <rect x="4" y="21" width="4" height="4" rx="0.5" fill="#6E87B6" opacity="0.4"/>
    <rect x="10" y="17" width="4" height="8" rx="0.5" fill="#6E87B6" opacity="0.6"/>
    <rect x="16" y="19" width="4" height="6" rx="0.5" fill="#6E87B6" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="38" y="19" font-family="'Inter', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="#333" letter-spacing="0.01em">Report Studio</text>
</svg>
