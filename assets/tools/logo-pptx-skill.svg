<svg xmlns="http://www.w3.org/2000/svg" width="190" height="28" viewBox="0 0 190 28" fill="none">
  <!-- Icon: stacked presentation slides -->
  <g transform="translate(2, 0)">
    <!-- Back slide -->
    <rect x="6" y="0" width="26" height="18" rx="2" fill="#9BB0D0" opacity="0.25"/>
    <!-- Middle slide -->
    <rect x="3" y="3" width="26" height="18" rx="2" fill="#6E87B6" opacity="0.25"/>
    <!-- Front slide -->
    <rect x="0" y="6" width="26" height="18" rx="2" fill="white" stroke="#6E87B6" stroke-width="1.5"/>
    <!-- Content -->
    <rect x="4" y="10" width="12" height="2" rx="1" fill="#6E87B6" opacity="0.7"/>
    <rect x="4" y="14" width="18" height="1.5" rx="0.75" fill="#CCC"/>
    <rect x="4" y="17.5" width="14" height="1.5" rx="0.75" fill="#CCC"/>
    <!-- .pptx badge -->
    <rect x="18" y="19" width="16" height="7" rx="2" fill="#6E87B6"/>
    <text x="26" y="24.5" font-family="'Inter', sans-serif" font-size="5" font-weight="700" fill="white" text-anchor="middle">.pptx</text>
  </g>
  <!-- Text -->
  <text x="42" y="19" font-family="'Inter', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="#333" letter-spacing="0.01em">PPTX Skill</text>
</svg>
