<svg xmlns="http://www.w3.org/2000/svg" width="210" height="40" viewBox="0 0 210 40" fill="none">
  <!-- Icon: PPTX slide with gear, scaled 60% -->
  <g transform="translate(0, 2) scale(0.6)">
    <!-- Presentation slide -->
    <rect x="4" y="4" width="44" height="32" rx="3" fill="white" stroke="#6E87B6" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect x="4" y="4" width="44" height="8" rx="3" fill="#6E87B6" opacity="0.15"/>
    <!-- Content lines -->
    <rect x="10" y="16" width="20" height="2.5" rx="1" fill="#6E87B6" opacity="0.7"/>
    <rect x="10" y="21" width="14" height="2" rx="1" fill="#CCC"/>
    <rect x="10" y="25" width="18" height="2" rx="1" fill="#CCC"/>
    <!-- Chart bars -->
    <rect x="10" y="31" width="5" height="3" rx="1" fill="#6E87B6" opacity="0.4"/>
    <rect x="17" y="29" width="5" height="5" rx="1" fill="#6E87B6" opacity="0.6"/>
    <rect x="24" y="27" width="5" height="7" rx="1" fill="#6E87B6" opacity="0.8"/>
    <!-- Gear -->
    <g transform="translate(38, 24)">
      <circle cx="8" cy="8" r="5" fill="white" stroke="#6E87B6" stroke-width="1.5"/>
      <circle cx="8" cy="8" r="2" fill="#6E87B6" opacity="0.6"/>
      <!-- Gear teeth -->
      <rect x="6.5" y="-1" width="3" height="3" rx="0.5" fill="#6E87B6" opacity="0.5"/>
      <rect x="6.5" y="14" width="3" height="3" rx="0.5" fill="#6E87B6" opacity="0.5"/>
      <rect x="-1" y="6.5" width="3" height="3" rx="0.5" fill="#6E87B6" opacity="0.5"/>
      <rect x="14" y="6.5" width="3" height="3" rx="0.5" fill="#6E87B6" opacity="0.5"/>
    </g>
    <!-- Arrow -->
    <path d="M58 22 L68 22" stroke="#6E87B6" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M65 18 L70 22 L65 26" stroke="#6E87B6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Output PPTX file -->
    <rect x="74" y="8" width="24" height="30" rx="2.5" fill="white" stroke="#6E87B6" stroke-width="1.5"/>
    <!-- Folded corner -->
    <path d="M88 8 L98 8 L98 18" fill="#E8EDF5" stroke="#6E87B6" stroke-width="1" stroke-linejoin="round"/>
    <path d="M88 8 L98 18 L88 18 Z" fill="#E8EDF5" stroke="#6E87B6" stroke-width="1" stroke-linejoin="round"/>
    <!-- PPTX label -->
    <text x="79" y="30" font-family="'Inter', sans-serif" font-size="7" font-weight="700" fill="#6E87B6" opacity="0.8">.pptx</text>
    <!-- Sparkle -->
    <g transform="translate(62, 10)" fill="#6E87B6" opacity="0.5">
      <path d="M4 0 L4.8 2.8 L8 4 L4.8 5.2 L4 8 L3.2 5.2 L0 4 L3.2 2.8 Z"/>
    </g>
  </g>

  <!-- Text -->
  <text x="66" y="24" font-family="'Inter', 'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#333" letter-spacing="0.01em">PPTX Skill</text>
</svg>
