<svg xmlns="http://www.w3.org/2000/svg" width="200" height="28" viewBox="0 0 200 28" fill="none">
  <!-- Icon: speech bubble with tag chips -->
  <g transform="translate(2, 0)">
    <!-- Speech bubble -->
    <rect x="0" y="0" width="30" height="20" rx="4" fill="white" stroke="#6E87B6" stroke-width="1.5"/>
    <path d="M6 20 L4 26 L12 20" fill="white" stroke="#6E87B6" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Tag chips inside bubble -->
    <rect x="4" y="4.5" width="12" height="5" rx="2.5" fill="#6E87B6" opacity="0.2" stroke="#6E87B6" stroke-width="0.8"/>
    <rect x="18" y="4.5" width="8" height="5" rx="2.5" fill="#9BB0D0" opacity="0.25" stroke="#9BB0D0" stroke-width="0.8"/>
    <rect x="4" y="11.5" width="10" height="5" rx="2.5" fill="#9BB0D0" opacity="0.25" stroke="#9BB0D0" stroke-width="0.8"/>
    <rect x="16" y="11.5" width="11" height="5" rx="2.5" fill="#6E87B6" opacity="0.2" stroke="#6E87B6" stroke-width="0.8"/>
  </g>
  <!-- Text -->
  <text x="42" y="19" font-family="'Inter', 'Noto Sans JP', sans-serif" font-size="20" font-weight="700" fill="#333" letter-spacing="0.01em">FA Analysis</text>
</svg>
